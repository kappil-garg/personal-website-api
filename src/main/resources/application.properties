# Base Application Configuration
# Sensitive or environment-specific values should be provided via environment variables rather than being committed to source control.

# Application Name
spring.application.name=personal-website-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Server Configuration
server.port=${SERVER_PORT:0}
server.servlet.context-path=${CONTEXT_PATH:/api}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:}
spring.data.mongodb.auto-index-creation=true

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-durations-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.mail.enabled=${HEALTH_MAIL_ENABLED:false}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
cors.allow-loopback-no-origin=${CORS_ALLOW_LOOPBACK_NO_ORIGIN:false}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:false}
cors.max-age=${CORS_MAX_AGE:3600}

# Admin authentication credentials must be provided via ADMIN_USERNAME and ADMIN_PASSWORD environment variables
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

# Logging Configuration
logging.level.com.kapil.personalwebsite=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL:WARN}
logging.level.org.springframework.data.mongodb=${MONGO_LOG_LEVEL:WARN}

# API Server Key (required for SSR/server-to-server requests)
api.server-key=${API_SERVER_KEY:}

# Email Configuration
email.provider=${EMAIL_PROVIDER:}
email.http-api.api-key=${EMAIL_HTTP_API_KEY:}
email.http-api.url=${EMAIL_HTTP_API_URL:}
email.http-api.provider=${EMAIL_HTTP_API_PROVIDER:}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connection-timeout=${MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.write-timeout=${MAIL_WRITE_TIMEOUT:5000}

# Contact Form Email Configuration
contact.email.to=${CONTACT_EMAIL_TO:}
contact.email.from=${CONTACT_EMAIL_FROM:}
contact.email.domain=${CONTACT_EMAIL_DOMAIN:}

# Contact Rate Limiting Configuration
rate.limit.contact.fingerprint.max-requests=${RATE_LIMIT_CONTACT_FP_MAX_REQUESTS:5}
rate.limit.contact.fingerprint.window-minutes=${RATE_LIMIT_CONTACT_FP_WINDOW_MINUTES:60}
rate.limit.contact.ip.max-requests=${RATE_LIMIT_CONTACT_IP_MAX_REQUESTS:20}
rate.limit.contact.ip.window-minutes=${RATE_LIMIT_CONTACT_IP_WINDOW_MINUTES:60}
rate.limit.contact-polish.fingerprint.max-requests=${RATE_LIMIT_CONTACT_POLISH_FP_MAX_REQUESTS:5}
rate.limit.contact-polish.fingerprint.window-minutes=${RATE_LIMIT_CONTACT_POLISH_FP_WINDOW_MINUTES:60}
rate.limit.contact-polish.ip.max-requests=${RATE_LIMIT_CONTACT_POLISH_IP_MAX_REQUESTS:20}
rate.limit.contact-polish.ip.window-minutes=${RATE_LIMIT_CONTACT_POLISH_IP_WINDOW_MINUTES:60}

# Blog Rate Limiting Configuration
rate.limit.blog.fingerprint.max-requests=${RATE_LIMIT_BLOG_FP_MAX_REQUESTS:60}
rate.limit.blog.fingerprint.window-minutes=${RATE_LIMIT_BLOG_FP_WINDOW_MINUTES:1}
rate.limit.blog.ip.max-requests=${RATE_LIMIT_BLOG_IP_MAX_REQUESTS:200}
rate.limit.blog.ip.window-minutes=${RATE_LIMIT_BLOG_IP_WINDOW_MINUTES:1}
rate.limit.blog-ask.fingerprint.max-requests=${RATE_LIMIT_BLOG_ASK_FP_MAX_REQUESTS:10}
rate.limit.blog-ask.fingerprint.window-minutes=${RATE_LIMIT_BLOG_ASK_FP_WINDOW_MINUTES:60}
rate.limit.blog-ask.ip.max-requests=${RATE_LIMIT_BLOG_ASK_IP_MAX_REQUESTS:40}
rate.limit.blog-ask.ip.window-minutes=${RATE_LIMIT_BLOG_ASK_IP_WINDOW_MINUTES:60}

# Portfolio Rate Limiting Configuration
rate.limit.portfolio-chat.fingerprint.max-requests=${RATE_LIMIT_PORTFOLIO_CHAT_FP_MAX_REQUESTS:20}
rate.limit.portfolio-chat.fingerprint.window-minutes=${RATE_LIMIT_PORTFOLIO_CHAT_FP_WINDOW_MINUTES:60}
rate.limit.portfolio-chat.ip.max-requests=${RATE_LIMIT_PORTFOLIO_CHAT_IP_MAX_REQUESTS:60}
rate.limit.portfolio-chat.ip.window-minutes=${RATE_LIMIT_PORTFOLIO_CHAT_IP_WINDOW_MINUTES:60}

# Proxy Configuration for Rate Limiting
rate.limit.trust-proxy-headers=${RATE_LIMIT_TRUST_PROXY_HEADERS:false}

# Security Configuration to prevent common attack paths. If not specified, uses default list.
security.blocked-paths=${SECURITY_BLOCKED_PATHS:}

# Cache configuration for portfolio summary caching, using Caffeine as the default cache provider
spring.cache.type=${SPRING_CACHE_TYPE:caffeine}
spring.cache.cache-names=${SPRING_CACHE_NAMES:portfolioSummary}
spring.cache.caffeine.spec=${SPRING_CACHE_CAFFEINE_SPEC:maximumSize=1,expireAfterWrite=10m}

# Spring AI configuration for Gemini models
spring.ai.google.genai.api-key=${GOOGLE_GENAI_API_KEY:}
spring.ai.google.genai.chat.options.model=${GOOGLE_GENAI_CHAT_MODEL:gemini-2.5-flash}

# Portfolio RAG / Embeddings configuration
spring.ai.model.embedding.enabled=${SPRING_AI_EMBEDDING_ENABLED:false}
spring.autoconfigure.exclude=${SPRING_AUTOCONFIGURE_EXCLUDE:}

# App level feature flags for portfolio RAG/embeddings functionality
app.features.embeddings.enabled=${APP_FEATURES_EMBEDDINGS_ENABLED:false}
app.features.embeddings.require-retrieval=${APP_FEATURES_EMBEDDINGS_REQUIRE_RETRIEVAL:false}

# Embedding batch size and delay during index rebuild if rate limits are being hit
app.features.embeddings.index-batch-size=${PORTFOLIO_INDEX_BATCH_SIZE:20}
app.features.embeddings.index-batch-delay-ms=${PORTFOLIO_INDEX_BATCH_DELAY_MS:1000}

# Gemini embedding configuration for portfolio chatbot
spring.ai.google.genai.embedding.project-id=${GCP_PROJECT_ID:}
spring.ai.google.genai.embedding.location=${GCP_REGION:}
spring.ai.google.genai.embedding.enabled=${SPRING_AI_GOOGLE_EMBEDDING_ENABLED:false}
spring.ai.google.genai.embedding.api-key=${GOOGLE_GENAI_API_KEY:}
spring.ai.google.genai.embedding.text.options.model=${GOOGLE_GENAI_EMBEDDING_MODEL:gemini-embedding-001}

# Optional PostgreSQL with pgvector configuration for vector store instead of in-memory
app.vector-store.pgvector.jdbc-url=${PORTFOLIO_VECTOR_JDBC_URL:}
app.vector-store.pgvector.username=${PORTFOLIO_VECTOR_DB_USER:postgres}
app.vector-store.pgvector.password=${PORTFOLIO_VECTOR_DB_PASSWORD:}
app.vector-store.pgvector.maximum-pool-size=${PORTFOLIO_VECTOR_DB_POOL_SIZE:5}
